version: '3.8'

services:
  react-frontend:
    build: 
      context: ./react-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - spring-backend
    restart: always

  spring-backend:
    build:
      context: ./Spring-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AI_SERVICE_URL=http://python-backend:8000/api/ai
      - FIREBASE_CREDENTIALS_PATH=file:/app/credentials/firebase-service-account-key.json
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
    volumes:
      - ./credentials:/app/credentials
    restart: always

  python-backend:
    build:
      context: ./python-ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./credentials:/app/credentials
    restart: always
